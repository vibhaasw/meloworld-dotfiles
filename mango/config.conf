# MangoWM Config — meloworld
# More options: https://github.com/DreamMaoMao/mango/wiki/

# ─── Autostart ────────────────────────────────────────────────────────────────
exec-once = ~/.config/mango/scripts/wallpaper-restore.sh
exec-once = bash -c 'while ! pgrep -x "awww-daemon|mpvpaper" > /dev/null; do sleep 0.05; done; quickshell'
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = ~/.local/bin/nightlight.sh
exec-once = ~/.config/mango/scripts/chime.sh
exec-once = ~/.config/mango/scripts/usb-sound.sh

# ─── Monitors ─────────────────────────────────────────────────────────────────
#allow_tearing=2

# ─── Window Effects ───────────────────────────────────────────────────────────
blur=1
blur_layer=1
blur_optimized=0
blur_params_num_passes=4
blur_params_radius=8
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

shadows=0
layer_shadows=0
shadow_only_floating=1
shadows_size=10
shadows_blur=15
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x000000ff

border_radius=8
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# ─── Animations ───────────────────────────────────────────────────────────────
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=400
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# ─── Scroller Layout ──────────────────────────────────────────────────────────
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# ─── Master-Stack Layout ──────────────────────────────────────────────────────
new_is_master=1
default_mfact=0.5
default_nmaster=1
smartgaps=0

# ─── Dwindle Layout ───────────────────────────────────────────────────────────
dwindle_smart_split = 1
dwindle_manual_split = 1
dwindle_drop_simple_split = 0

# ─── Overview ─────────────────────────────────────────────────────────────────
hotarea_size=10
enable_hotarea=1
hotarea_corner = 3
ov_tab_mode=1
overviewgappi=5
overviewgappo=30
ov_no_resize = 1

# ─── Misc ─────────────────────────────────────────────────────────────────────
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=0
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
drag_tile_to_tile=1
tag_carousel = 1

# ─── Keyboard ─────────────────────────────────────────────────────────────────
repeat_rate = 40
repeat_delay = 400
numlockon = 1
xkb_rules_layout = tr
xkb_rules_options = caps:escape

# ─── Trackpad ─────────────────────────────────────────────────────────────────
# (requires relogin to apply)
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1
trackpad_accel_profile=2
trackpad_accel_speed=0.0

# ─── Mouse ────────────────────────────────────────────────────────────────────
# (requires relogin to apply)
mouse_natural_scrolling=0
mouse_accel_profile=1
mouse_accel_speed=-0.2

# ─── Cursor ───────────────────────────────────────────────────────────────────
cursor_size=22
cursor_theme=Bibata-Modern-Classic

# ─── Appearance ───────────────────────────────────────────────────────────────
gappih=8
gappiv=8
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4
rootcolor=0x201b14ff
bordercolor=0x37474fff
focuscolor=0x80cbc4ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xef9a9aff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

splitcolor=0x80cbc4ff
dropcolor=0x37474fff

# ─── Tag Layout Rules ─────────────────────────────────────────────────────────
# layout options: tile, scroller, grid, deck, monocle, center_tile, vertical_tile, vertical_scroller, dwindle
tagrule=id:1,layout_name:dwindle
tagrule=id:2,layout_name:dwindle
tagrule=id:3,layout_name:dwindle
tagrule=id:4,layout_name:dwindle
tagrule=id:5,layout_name:dwindle
tagrule=id:6,layout_name:dwindle
tagrule=id:7,layout_name:dwindle
tagrule=id:8,layout_name:dwindle
tagrule=id:9,layout_name:dwindle

# ═══════════════════════════════════════════════════════════════════════════════
# KEY BINDINGS
# key names: use `xev` or `wev` to find key names
# mod keys: super, ctrl, alt, shift, none
#
# Modifier logic:
#   SUPER           = window focus / navigation
#   SUPER+SHIFT     = window manipulation (move, state change)
#   SUPER+CTRL      = move client to tag
#   SUPER+ALT       = layout-level controls (gaps, proportions, layout switch)
#   ALT+SHIFT       = monitor focus / client-to-monitor
#   CTRL+SHIFT      = floating window move
#   CTRL+ALT        = floating window resize
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Session ──────────────────────────────────────────────────────────────────
bind=SUPER,r,reload_config
bind=SUPER+SHIFT,escape,quit
bind=SUPER+ALT,l,spawn,quickshell -c ~/.config/quickshell/lockscreen

# ─── Launch ───────────────────────────────────────────────────────────────────

bind = ALT,space,spawn,qs ipc call launcher toggle
bind = SUPER,Return,spawn,kitty

bind = SUPER,e,spawn,qs ipc call launcher openEmoji
bind = SUPER,v,spawn,qs ipc call launcher openClipboard
bind = SUPER,w,spawn,qs ipc call launcher openWallpaper
bind = SUPER,n,spawn,nautilus

# Old unused rofi shortcuts
# bind = ALT,space,spawn,rofi -show drun
# bind = SUPER,e,spawn,rofimoji --hidden-descriptions --use-icons --action copy --selector-args="-no-config -theme $HOME/.config/rofi/themes/emoji.rasi"
# bind = SUPER,v,spawn, ~/.config/mango/scripts/clipboard.sh
# bind = SUPER,w,spawn, ~/.config/rofi/scripts/wallpaper-select.sh


# ─── Window: Lifecycle ────────────────────────────────────────────────────────
bind=SUPER,q,killclient

# ─── Window: Focus ────────────────────────────────────────────────────────────
# Pure vi-style hjkl. SUPER,l (focus right) is unambiguous —
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# ─── Window: Overview & Stack Cycle ──────────────────────────────────────────
bind=SUPER,Tab,toggleoverview
bind=SUPER+SHIFT,Tab,focusstack,next

# ─── Window: Swap ─────────────────────────────────────────────────────────────
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right

# ─── Window: State ────────────────────────────────────────────────────────────
bind=SUPER,space,togglefloating
bind=SUPER,f,togglefullscreen
bind=SUPER+SHIFT,f,togglefakefullscreen
bind=SUPER,m,togglemaximizescreen
bind=SUPER,comma,minimized
bind=SUPER+SHIFT,comma,restore_minimized
bind=SUPER,g,toggleglobal
bind=SUPER,o,toggleoverlay
# grave (backtick)
bind=SUPER,grave,toggle_scratchpad

# ─── Layout ───────────────────────────────────────────────────────────────────
bind=SUPER+ALT,space,switch_layout

bind=SUPER+ALT,f,set_proportion,1.0
bind=SUPER+ALT,p,switch_proportion_preset

bind=SUPER+ALT,h,spawn,mmsg split h
bind=SUPER+ALT,v,spawn,mmsg split v

# ─── Gaps ─────────────────────────────────────────────────────────────────────
bind=SUPER+ALT,equal,incgaps,1
bind=SUPER+ALT,minus,incgaps,-1
bind=SUPER+ALT,g,togglegaps

# ─── Tags: Switch ─────────────────────────────────────────────────────────────
bind=SUPER,Left,viewtoleft,0
bind=SUPER,Right,viewtoright,0
bind=SUPER+CTRL,Left,tagtoleft,0
bind=SUPER+CTRL,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# ─── Tags: Move Client ────────────────────────────────────────────────────────
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# ─── Monitor ──────────────────────────────────────────────────────────────────
bind=ALT+SHIFT,Left,focusmon,left
bind=ALT+SHIFT,Right,focusmon,right
bind=SUPER+ALT,Left,tagmon,left
bind=SUPER+ALT,Right,tagmon,right

# ─── Window: Move (Floating) ──────────────────────────────────────────────────
bind=CTRL+SHIFT,Up,movewin,+0,-20
bind=CTRL+SHIFT,Down,movewin,+0,+20
bind=CTRL+SHIFT,Left,movewin,-20,+0
bind=CTRL+SHIFT,Right,movewin,+20,+0

# ─── Window: Resize ───────────────────────────────────────────────────────────
bind=CTRL+ALT,Up,resizewin,+0,-20
bind=CTRL+ALT,Down,resizewin,+0,+20
bind=CTRL+ALT,Left,resizewin,-20,+0
bind=CTRL+ALT,Right,resizewin,+20,+0

# ─── Mouse ────────────────────────────────────────────────────────────────────
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# ─── Scroll: Tag Navigation ───────────────────────────────────────────────────
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# ─── Media & Hardware Keys ────────────────────────────────────────────────────
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ --limit 1.0
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set 5%+
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-

# ─── Media Controls ───────────────────────────────────────────────────────────
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous

# ─── Screenshots ──────────────────────────────────────────────────────────────
#bind=SUPER+SHIFT,s,spawn,sh -c 'grim /tmp/qs-master.png; quickshell -c ~/.config/quickshell/screenshot/'
bind=SUPER+SHIFT,s,spawn,sh -c 'grim /tmp/qs-master.png; qs ipc call screenshot capture'
layerrule=noblur:1,layer_name:selection

# Unblur Polkit
layerrule=noblur:1,layer_name:polkit-dialog

# ─── Layer Animations ─────────────────────────────────────────────────────────
#layerrule=animation_type_open:zoom,layer_name:rofi
#layerrule=animation_type_close:zoom,layer_name:rofi

# ─── Window Rules ─────────────────────────────────────────────────────────────
windowrule=isfloating:1,width:600,height:400,title:nmtui
#windowrule=isfloating:1,width:860,height:600,title:Ghostty
windowrule=isfloating:1,width:1600,height:900,appid:Spotify
windowrule=isfloating:1,width:900,height:600,appid:org.gnome.Nautilus
windowrule=isfloating:1,width:1400,height:860,title:Vesktop
#windowrule=isfloating:1,width:860,height:600,title:kitty
