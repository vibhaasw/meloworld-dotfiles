# ╭──────────────────────────────────────────╮
# │  kitty.conf — meloworld                  │
# │  material dark · neo-brutalist · cozy    │
# ╰──────────────────────────────────────────╯

# ── Font ──────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# ── Cursor ────────────────────────────────
cursor                #CE93D8
cursor_text_color     background
cursor_shape          block
cursor_blink_interval 0

# ── Window ────────────────────────────────
window_padding_width        20
hide_window_decorations     yes
confirm_os_window_close     0
background_opacity          0.80
dynamic_background_opacity  yes

# ── Colors — Material Dark ─────────────────
foreground  #ffffff
background  #212121

selection_foreground  #212121
selection_background  #CE93D8

# black
color0   #212121
color8   #616161

# red
color1   #ef9a9a
color9   #ff5252

# green
color2   #a5d6a7
color10  #69f0ae

# yellow
color3   #fff59d
color11  #ffff00

# blue
color4   #90caf9
color12  #448aff

# magenta
color5   #CE93D8
color13  #E040FB

# cyan
color6   #80cbc4
color14  #64ffda

# white
color7   #ffffff
color15  #ffffff

# ── URL ───────────────────────────────────
url_color          #80cbc4
url_style          curly

# ── Bell ──────────────────────────────────
enable_audio_bell  no
visual_bell_duration 0.0

# ── Shell integration ─────────────────────
# keeps the block cursor — shell integration
# would override it to beam at the prompt
shell_integration  no-cursor

# ── Tab bar ───────────────────────────────
tab_bar_style               powerline
tab_powerline_style         slanted
active_tab_foreground       #212121
active_tab_background       #CE93D8
active_tab_font_style       bold
inactive_tab_foreground     #9e9e9e
inactive_tab_background     #424242
inactive_tab_font_style     normal
tab_bar_background          #212121

# ── Misc ──────────────────────────────────
scrollback_lines     10000
repaint_delay        8
input_delay          2
sync_to_monitor      yes

# ── Cursor trail ──────────────────────────
cursor_trail              3
cursor_trail_decay        0.1 0.4
cursor_trail_start_threshold  2
